{% extends "base.html" %}

{% block title %}Recall Challenge{% endblock %}

{% block content %}
<h1>Recall Challenge</h1>
<p>{{ instruction }}</p>


<form method="POST" action="{{ url_for('auth.recall') }}">

    <input type="hidden" name="sequence" id="sequenceInput">

    <div class="grid" id="imageGrid">
        {% for img in images %}
            <div class="tile">
                <img src="/images/{{ img }}"
                     data-id="{{ img }}"
                     alt="authentication image">
                <span class="order-badge"></span>
            </div>
        {% endfor %}
    </div>

    <button class="btn" id="submitBtn">Submit</button>
</form>

<a href="/" class="btn secondary">Cancel</a>

<!-- Error Modal -->
<div id="errorModal" class="modal hidden">
    <div class="modal-content">
        <h2>Verification Failed</h2>
        <p id="modalMessage"></p>
        <button id="closeModal" class="btn">OK</button>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    window.isRecallPage = true;
</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
